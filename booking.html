<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Laundry - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">LaundryPH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="tracking.html">Track</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="order_history.html">Orders</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="service_account.html">My Service</a></li>
            <li class="nav-item auth-only"><button id="logoutButton" class="btn btn-outline-light btn-sm">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card p-4">
            <h2 class="mb-4">Laundry Booking</h2>
            <form id="bookingForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Service</label>
                  <select class="form-select" id="service" required>
                    <option value="wash" data-price="60" data-unit="kg">Wash - ₱60/kg</option>
                    <option value="washdry" data-price="90" data-unit="kg">Wash & Dry - ₱90/kg</option>
                    <option value="dryfold" data-price="120" data-unit="kg">Wash, Dry & Fold - ₱120/kg</option>
                    <option value="dryclean" data-price="180" data-unit="item">Dry Cleaning - ₱180/item</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label" id="quantityLabel">Weight (kg)</label>
                  <input type="number" step="0.1" class="form-control" id="quantity" placeholder="0" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Pickup Date</label>
                  <input type="date" class="form-control" id="pickupDate" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Pickup Time</label>
                  <input type="time" class="form-control" id="pickupTime" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Delivery Date</label>
                  <input type="date" class="form-control" id="deliveryDate" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Delivery Time</label>
                  <input type="time" class="form-control" id="deliveryTime" required>
                </div>
                <div class="col-12">
                  <label class="form-label">Special Instructions</label>
                  <textarea class="form-control" id="instructions" rows="3"></textarea>
                </div>
              </div>
              <div class="mt-4 d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                <div class="alert alert-secondary mb-0" id="pricingResult">Total: ₱0.00</div>
                <button class="btn btn-primary" type="submit">Submit Booking</button>
              </div>
              <div class="mt-3" id="bookingMessage"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
