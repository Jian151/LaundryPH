<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">LaundryPH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="order_history.html">Orders</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="profile.html">Profile</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="register.html">Register</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-lg-3">
          <div class="card p-3 text-center">
            <div class="text-muted">Orders</div>
            <h3 id="dashboardOrders">0</h3>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card p-3 text-center">
            <div class="text-muted">Pending</div>
            <h3 id="dashboardPending">0</h3>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card p-3 text-center">
            <div class="text-muted">Delivered</div>
            <h3 id="dashboardDelivered">0</h3>
          </div>
        </div>
        <div class="col-sm-6 col-lg-3">
          <div class="card p-3 text-center">
            <div class="text-muted">Total Spent</div>
            <h3 id="dashboardTotal">₱0.00</h3>
          </div>
        </div>
      </div>
      <div class="card p-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-3">
          <h5>Recent Orders</h5>
          <div>
            <a class="btn btn-outline-primary me-2" href="booking.html">Book Laundry</a>
            <a class="btn btn-primary" href="order_history.html">View Orders</a>
          </div>
        </div>
        <div id="dashboardOrdersList"></div>
      </div>
    </div>
  </body>
</html>
