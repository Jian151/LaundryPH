<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">LaundryPH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="booking.html">Book</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="order_history.html">Orders</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="service_account.html">My Service</a></li>
            <li class="nav-item auth-only"><button id="logoutButton" class="btn btn-outline-light btn-sm">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5 min-vh-100 d-flex align-items-center">
      <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
          <div class="card p-4 shadow-sm">
            <h2 class="mb-4 text-center">Register</h2>
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Address</label>
                <input class="form-control" name="address">
              </div>
              <div class="mb-3">
                <label class="form-label">Create Account Type</label>
                <div class="btn-group w-100" role="group" aria-label="Account type">
                  <input type="radio" class="btn-check" name="accountType" id="accountTypeCustomer" value="customer" autocomplete="off" checked>
                  <label class="btn btn-outline-primary w-50" for="accountTypeCustomer">Customer Account</label>
                  <input type="radio" class="btn-check" name="accountType" id="accountTypeService" value="service" autocomplete="off">
                  <label class="btn btn-outline-primary w-50" for="accountTypeService">Laundry Service Account</label>
                </div>
                <div class="form-text">Customers can book laundry. Laundry services can create and manage a store page.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
              </div>
              <button class="btn btn-primary w-100">Register</button>
            </form>
            <div id="registerMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
