<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">LaundryPH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="order_history.html">Orders</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="register.html">Register</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <h2 class="mb-4">Profile</h2>
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" id="profileName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input class="form-control" id="profilePhone" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Address</label>
                <input class="form-control" id="profileAddress">
              </div>
              <button class="btn btn-primary w-100" type="submit">Save Profile</button>
            </form>
            <div class="mt-3" id="profileMessage"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
