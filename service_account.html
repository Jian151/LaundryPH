<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Service - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">LaundryPH</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="services.html">Services</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="booking.html">Book Now</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
            <li class="nav-item guest-only"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item auth-only"><a class="nav-link" href="order_history.html">Orders</a></li>
            <li class="nav-item auth-only"><button id="logoutButton" class="btn btn-outline-light btn-sm">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      <div class="card p-4">
        <h2 class="mb-4">My Laundry Service</h2>
        <form id="serviceForm">
          <div class="mb-3">
            <label class="form-label">Service Name</label>
            <input class="form-control" id="serviceName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Motto</label>
            <input class="form-control" id="serviceMotto">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="serviceDescription" rows="3"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Price</label>
              <input type="number" step="0.01" class="form-control" id="servicePrice" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Unit</label>
              <select class="form-select" id="serviceUnit">
                <option value="kg">kg</option>
                <option value="item">item</option>
              </select>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2 flex-wrap">
            <button class="btn btn-primary" type="submit">Save Service</button>
            <button id="deleteService" class="btn btn-outline-danger" type="button">Delete Service</button>
          </div>
        </form>
        <div class="mt-3" id="serviceMessage"></div>
      </div>
    </div>
  </body>
</html>
