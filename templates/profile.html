<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <h2 class="mb-4">Profile</h2>
            <form method="post">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" value="{{ current_user.name }}" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" value="{{ current_user.phone }}" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Address</label>
                <input class="form-control" name="address" value="{{ current_user.address }}">
              </div>
              <button class="btn btn-primary">Save</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
