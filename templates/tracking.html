<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Track Order - LaundryPH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card p-4">
            <h2 class="mb-4">Track Order</h2>
            <form method="post" class="mb-4">
              <div class="input-group">
                <input type="text" class="form-control" name="order_number" placeholder="Order Number" required>
                <button class="btn btn-primary">Track</button>
              </div>
            </form>

            {% if order %}
            <div>
              <h5>Order {{ order.order_number }}</h5>
              <p>Status: <strong>{{ order.status }}</strong></p>
              <div class="progress mb-3">
                <div class="progress-bar" role="progressbar" style="width: {{ 100 if order.status == 'Delivered' else 70 if order.status == 'Out for Delivery' else 55 if order.status == 'Ready for Delivery' else 40 if order.status == 'Drying' else 25 if order.status == 'Washing' else 15 if order.status == 'Picked Up' else 5 }}%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <ul class="list-group">
                <li class="list-group-item">Received</li>
                <li class="list-group-item">Driver Assigned</li>
                <li class="list-group-item">Picked Up</li>
                <li class="list-group-item">Washing</li>
                <li class="list-group-item">Drying</li>
                <li class="list-group-item">Ready for Delivery</li>
                <li class="list-group-item">Out for Delivery</li>
                <li class="list-group-item">Delivered</li>
              </ul>
            </div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
